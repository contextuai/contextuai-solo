<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextuAI Solo</title>
</head>
<body class="bg-neutral-50 dark:bg-[#242523] text-neutral-900 dark:text-neutral-100">
  <!-- Splash screen shown instantly while backend starts -->
  <div id="splash" style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#242523;flex-direction:column;gap:16px;font-family:system-ui,sans-serif;">
    <div style="width:40px;height:40px;border:4px solid #3f3f46;border-top-color:#f97316;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p id="splash-status" style="color:#a1a1aa;font-size:14px;">Starting ContextuAI Solo...</p>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      (function(){
        var splash=document.getElementById('splash');
        var status=document.getElementById('splash-status');
        // In dev mode (no Tauri), hide splash immediately
        if(!window.__TAURI__){splash.style.display='none';return;}
        // Poll the backend health endpoint on the fixed port
        var start=Date.now();
        function poll(){
          var elapsed=Math.round((Date.now()-start)/1000);
          if(elapsed>3)status.textContent='Starting backend... ('+elapsed+'s)';
          if(elapsed>60){status.textContent='Backend failed to start. Please restart the app.';return;}
          fetch('http://127.0.0.1:18741/health').then(function(r){
            if(r.ok){splash.style.display='none';return;}
            setTimeout(poll,1000);
          }).catch(function(){setTimeout(poll,1000);});
        }
        setTimeout(poll,500);
      })();
    </script>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
