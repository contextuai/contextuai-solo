name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential \
            libglib2.0-dev libpango1.0-dev libharfbuzz-dev libffi-dev

      - name: Install backend dependencies
        working-directory: backend
        env:
          CMAKE_ARGS: "-DGGML_NATIVE=OFF"
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: uvicorn app:app --host 127.0.0.1 --port 18741 &
        env:
          CONTEXTUAI_MODE: desktop

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c 'until curl -sf http://127.0.0.1:18741/health > /dev/null 2>&1; do sleep 2; done'
          echo "Backend ready."
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:1420 > /dev/null 2>&1; do sleep 2; done'
          echo "Frontend ready."

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
