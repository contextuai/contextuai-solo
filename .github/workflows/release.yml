name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0-beta)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  tag:
    name: Create Tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

  build:
    name: Build (${{ matrix.platform.name }})
    needs: [tag]
    if: always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            sidecar-bin: contextuai-solo-backend.exe
          - name: macOS
            os: macos-latest
            rust-target: aarch64-apple-darwin
            sidecar-bin: contextuai-solo-backend
          - name: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            sidecar-bin: contextuai-solo-backend
            tauri-bundles: deb,rpm

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: frontend/src-tauri/target
          key: rust-${{ matrix.platform.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ matrix.platform.os }}-

      # ── System dependencies (Linux) ────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf cmake build-essential \
            libglib2.0-dev libpango1.0-dev libharfbuzz-dev libffi-dev

      # ── Step 1: Build Python sidecar (PyInstaller) ─────────────────────
      - name: Install Python dependencies
        working-directory: backend
        env:
          CMAKE_ARGS: "-DGGML_NATIVE=OFF"
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build sidecar with PyInstaller
        working-directory: backend
        shell: bash
        run: pyinstaller contextuai-solo-backend.spec --distpath ../frontend/src-tauri/sidecar --workpath ./build --noconfirm

      - name: Flatten sidecar output
        shell: bash
        run: |
          SIDECAR_DIR="frontend/src-tauri/sidecar"
          NESTED="$SIDECAR_DIR/contextuai-solo-backend"
          if [ -d "$NESTED" ]; then
            TEMP_DIR="$SIDECAR_DIR/_pyinstaller_temp"
            mv "$NESTED" "$TEMP_DIR"
            mv "$TEMP_DIR"/* "$SIDECAR_DIR/"
            rmdir "$TEMP_DIR"
          fi
          ls -la "$SIDECAR_DIR/${{ matrix.platform.sidecar-bin }}"

      # ── Step 2: Build Tauri desktop app ────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build -- --target ${{ matrix.platform.rust-target }} ${{ matrix.platform.tauri-bundles && format('--bundles {0}', matrix.platform.tauri-bundles) || '' }}

      # ── Step 3: Collect installers ─────────────────────────────────────
      - name: Collect Windows installers
        if: matrix.platform.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-assets
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/msi/*.msi release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/msi/*.msi.sig release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/nsis/*setup.exe release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/nsis/*setup.exe.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Collect macOS installer
        if: matrix.platform.os == 'macos-latest'
        run: |
          mkdir -p release-assets
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/dmg/*.dmg release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/macos/*.app.tar.gz release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/macos/*.app.tar.gz.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Collect Linux installers
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          mkdir -p release-assets
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/deb/*.deb release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/rpm/*.rpm release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/appimage/*.AppImage release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/appimage/*.AppImage.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.name }}
          path: release-assets/*

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

      - name: Generate and upload updater latest.json
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO="contextuai/contextuai-solo"
          BASE_URL="https://github.com/$REPO/releases/download/$RELEASE_TAG"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(gh release view "$RELEASE_TAG" --json body -q .body 2>/dev/null || echo "")

          # Read signature files
          read_sig() { cat "release-assets/$1" 2>/dev/null || echo ""; }

          NSIS_SIG=$(read_sig "ContextuAI Solo_${VERSION}_x64-setup.exe.sig")
          MAC_SIG=$(read_sig "ContextuAI Solo.app.tar.gz.sig")
          APPIMAGE_SIG=$(read_sig "ContextuAI Solo_${VERSION}_amd64.AppImage.sig")

          python3 -c "
          import json, sys
          notes = sys.argv[1]
          print(json.dumps({
            'version': '$VERSION',
            'notes': notes,
            'pub_date': '$DATE',
            'platforms': {
              'windows-x86_64': {
                'signature': '$NSIS_SIG',
                'url': '$BASE_URL/ContextuAI+Solo_${VERSION}_x64-setup.exe'
              },
              'darwin-aarch64': {
                'signature': '$MAC_SIG',
                'url': '$BASE_URL/ContextuAI+Solo.app.tar.gz'
              },
              'linux-x86_64': {
                'signature': '$APPIMAGE_SIG',
                'url': '$BASE_URL/ContextuAI+Solo_${VERSION}_amd64.AppImage'
              }
            }
          }, indent=2))
          " "$NOTES" > latest.json

          cat latest.json
          gh release upload "$RELEASE_TAG" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
