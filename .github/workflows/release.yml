name: Release

# Single-workflow release. Three trigger paths, one pipeline:
#
#   1. workflow_dispatch — manually fire from the Actions UI with a version
#      input. Useful for re-running a release or ad-hoc tagging.
#
#   2. push to a tag matching v* — someone (or this workflow's own `tag` job)
#      pushed a tag. Skip the tag step, jump straight to build + publish.
#
#   3. push to main with a commit subject matching
#      `chore: release vX.Y.Z(-N)( (#NNN))?` — the squash-merge of a
#      release-bump PR. Verify the three version files agree, then tag and
#      release. This replaces the previous two-workflow split where
#      `auto-release.yml` dispatched `release.yml` via a PAT — by doing
#      everything in a single workflow run, GitHub's anti-recursion
#      restriction (which blocks GITHUB_TOKEN from triggering other
#      workflows) is no longer in our way.

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0-12)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Compute: decide whether to release and resolve the tag ───────────────
  compute:
    name: Determine release
    runs-on: ubuntu-latest
    # Fast-path: skip the workflow entirely for unrelated pushes to main.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release v'))
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      should_release: ${{ steps.tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and verify (when applicable)
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          should_release=false
          release_tag=""

          case "$EVENT_NAME" in
            workflow_dispatch)
              release_tag="$DISPATCH_VERSION"
              should_release=true
              ;;
            push)
              if [[ "$REF" == refs/tags/v* ]]; then
                release_tag="${REF#refs/tags/}"
                should_release=true
              elif [[ "$REF" == refs/heads/main ]]; then
                # Strict parse: only accept "chore: release vX.Y.Z" or
                # "chore: release vX.Y.Z-N", with the optional " (#NNN)"
                # GitHub appends on squash merges. Non-numeric prereleases
                # like "-beta.3" are rejected — they break Windows MSI.
                SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
                pattern='^chore: release (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?)( \(#[0-9]+\))?$'
                if [[ ! "$SUBJECT" =~ $pattern ]]; then
                  echo "::notice::Subject '$SUBJECT' does not match strict release pattern. Skipping."
                else
                  release_tag="${BASH_REMATCH[1]}"
                  VERSION="${release_tag#v}"

                  # Cross-check the three version files against the subject —
                  # catches typos or a forgotten file bump before we tag.
                  PKG=$(jq -r .version frontend/package.json)
                  TAURI=$(jq -r .version frontend/src-tauri/tauri.conf.json)
                  CARGO=$(grep -E '^version\s*=' frontend/src-tauri/Cargo.toml | head -n1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)"/\1/')
                  echo "Expected: $VERSION"
                  echo "  frontend/package.json:              $PKG"
                  echo "  frontend/src-tauri/tauri.conf.json: $TAURI"
                  echo "  frontend/src-tauri/Cargo.toml:      $CARGO"

                  fail=0
                  [[ "$PKG"   != "$VERSION" ]] && { echo "::error::package.json version ($PKG) != $VERSION"; fail=1; }
                  [[ "$TAURI" != "$VERSION" ]] && { echo "::error::tauri.conf.json version ($TAURI) != $VERSION"; fail=1; }
                  [[ "$CARGO" != "$VERSION" ]] && { echo "::error::Cargo.toml version ($CARGO) != $VERSION"; fail=1; }
                  [[ "$fail" == "1" ]] && exit 1

                  # Idempotent: if the tag already exists (e.g. a previous
                  # run already tagged this commit), skip the release.
                  if gh api "repos/${{ github.repository }}/git/ref/tags/$release_tag" >/dev/null 2>&1; then
                    echo "::warning::Tag $release_tag already exists — skipping release."
                  else
                    should_release=true
                  fi
                fi
              fi
              ;;
          esac

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "Computed: release_tag='$release_tag' should_release=$should_release"

  # ── Tag: only for dispatch + chore-on-main paths. Tag-push events skip. ──
  #
  # Uses the GitHub REST API (`gh api`) instead of `git push origin <tag>` —
  # the latter fails on this repo because default_workflow_permissions is set
  # to "read" at the org/repo level, and the workflow-level
  # `permissions: contents: write` elevation isn't enough to satisfy the
  # git smart-HTTP push endpoint (the extraheader is set but the push is
  # rejected, manifesting as a confusing `could not read Username` error).
  # `gh api` uses GH_TOKEN directly against the refs API and works fine.
  tag:
    name: Create Tag
    needs: [compute]
    if: |
      needs.compute.outputs.should_release == 'true' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create tag via REST API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.compute.outputs.release_tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          echo "Ensuring tag $RELEASE_TAG at $TARGET_SHA"

          # Idempotent: a redundant workflow_dispatch racing the chore-on-main
          # auto-release (or a re-run) must NOT hard-fail with HTTP 422
          # "Reference already exists". Only error if the tag exists but points
          # at a different commit — that's a real conflict worth stopping for.
          existing_sha=$(gh api "repos/${{ github.repository }}/git/ref/tags/$RELEASE_TAG" \
            --jq '.object.sha' 2>/dev/null || echo "")
          if [[ -n "$existing_sha" ]]; then
            if [[ "$existing_sha" == "$TARGET_SHA" ]]; then
              echo "Tag $RELEASE_TAG already exists at $TARGET_SHA — nothing to do."
              exit 0
            fi
            echo "::error::Tag $RELEASE_TAG already exists at $existing_sha, not $TARGET_SHA. Refusing to move a published tag."
            exit 1
          fi

          gh api "repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/$RELEASE_TAG" \
            -f "sha=$TARGET_SHA" \
            --silent
          echo "Tag created."

  build:
    name: Build (${{ matrix.platform.name }})
    needs: [compute, tag]
    if: |
      always() && needs.compute.outputs.should_release == 'true' && (
        needs.tag.result == 'success' || needs.tag.result == 'skipped'
      )
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            sidecar-bin: contextuai-solo-backend.exe
          - name: macOS
            os: macos-latest
            rust-target: aarch64-apple-darwin
            sidecar-bin: contextuai-solo-backend
          - name: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            sidecar-bin: contextuai-solo-backend
            tauri-bundles: deb,rpm

    runs-on: ${{ matrix.platform.os }}
    env:
      RELEASE_TAG: ${{ needs.compute.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: frontend/src-tauri/target
          key: rust-${{ matrix.platform.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ matrix.platform.os }}-

      # ── System dependencies (Linux) ────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf cmake build-essential \
            libglib2.0-dev libpango1.0-dev libharfbuzz-dev libffi-dev

      # ── Step 1: Build Python sidecar (PyInstaller) ─────────────────────
      - name: Install Python dependencies
        working-directory: backend
        env:
          CMAKE_ARGS: "-DGGML_NATIVE=OFF"
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Fetch the bundled embedding model into the backend tree so the
      # PyInstaller spec's `datas` entry (models/embedding/...) bundles it.
      # Without this the packaged app has no embedding model and all RAG
      # ingestion fails ("0 docs of N files").
      - name: Fetch embedding model
        working-directory: backend
        shell: bash
        env:
          MODELS_DIR: ${{ github.workspace }}/backend/models
        run: python scripts/fetch_embedding_model.py

      - name: Build sidecar with PyInstaller
        working-directory: backend
        shell: bash
        run: pyinstaller contextuai-solo-backend.spec --distpath ../frontend/src-tauri/sidecar --workpath ./build --noconfirm

      - name: Flatten sidecar output
        shell: bash
        run: |
          SIDECAR_DIR="frontend/src-tauri/sidecar"
          NESTED="$SIDECAR_DIR/contextuai-solo-backend"
          if [ -d "$NESTED" ]; then
            TEMP_DIR="$SIDECAR_DIR/_pyinstaller_temp"
            mv "$NESTED" "$TEMP_DIR"
            mv "$TEMP_DIR"/* "$SIDECAR_DIR/"
            rmdir "$TEMP_DIR"
          fi
          ls -la "$SIDECAR_DIR/${{ matrix.platform.sidecar-bin }}"

      # ── Step 2: Build Tauri desktop app ────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Remove any stale bundler outputs restored from the Rust cache.
      # Without this, beta-era artifacts (e.g. `*_1.0.0_*` from when the MSI
      # bundler stripped non-numeric prereleases) ride along in target/ and
      # get picked up by the collect steps below.
      - name: Clean stale bundle outputs from Rust cache
        shell: bash
        run: rm -rf frontend/src-tauri/target/*/release/bundle/

      - name: Build Tauri app
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build -- --target ${{ matrix.platform.rust-target }} ${{ matrix.platform.tauri-bundles && format('--bundles {0}', matrix.platform.tauri-bundles) || '' }}

      # ── Step 3: Collect installers ─────────────────────────────────────
      - name: Collect Windows installers
        if: matrix.platform.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-assets
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/msi/*_${VERSION}_*.msi release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/msi/*_${VERSION}_*.msi.sig release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/nsis/*_${VERSION}_*setup.exe release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/nsis/*_${VERSION}_*setup.exe.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Collect macOS installer
        if: matrix.platform.os == 'macos-latest'
        run: |
          mkdir -p release-assets
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/dmg/*_${VERSION}_*.dmg release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/macos/*.app.tar.gz release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/macos/*.app.tar.gz.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Collect Linux installers
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          mkdir -p release-assets
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          cp "$BUNDLE_DIR"/deb/*_${VERSION}_*.deb release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/rpm/*-${VERSION}-*.rpm release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/appimage/*_${VERSION}_*.AppImage release-assets/ 2>/dev/null || true
          cp "$BUNDLE_DIR"/appimage/*_${VERSION}_*.AppImage.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.name }}
          path: release-assets/*

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [compute, build]
    # The `tag` job is intentionally skipped on tag-push events (the tag
    # already exists). Without an explicit `if:` here, GitHub Actions
    # cascades that skipped state down the dependency graph and skips this
    # job too — even though `build` reports success. Override with the
    # success-of-build check that actually matters. See v1.0.0-12 run
    # 26340064233 where all builds succeeded but no release was published.
    if: |
      always()
      && needs.compute.outputs.should_release == 'true'
      && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.compute.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

      - name: Generate and upload updater latest.json
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO="contextuai/contextuai-solo"
          BASE_URL="https://github.com/$REPO/releases/download/$RELEASE_TAG"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(gh release view "$RELEASE_TAG" --json body -q .body 2>/dev/null || echo "")

          # Read signature files
          read_sig() { cat "release-assets/$1" 2>/dev/null || echo ""; }

          NSIS_SIG=$(read_sig "ContextuAI Solo_${VERSION}_x64-setup.exe.sig")
          MAC_SIG=$(read_sig "ContextuAI Solo.app.tar.gz.sig")
          APPIMAGE_SIG=$(read_sig "ContextuAI Solo_${VERSION}_amd64.AppImage.sig")

          python3 -c "
          import json, sys
          notes = sys.argv[1]
          print(json.dumps({
            'version': '$VERSION',
            'notes': notes,
            'pub_date': '$DATE',
            'platforms': {
              'windows-x86_64': {
                'signature': '$NSIS_SIG',
                'url': '$BASE_URL/ContextuAI+Solo_${VERSION}_x64-setup.exe'
              },
              'darwin-aarch64': {
                'signature': '$MAC_SIG',
                'url': '$BASE_URL/ContextuAI+Solo.app.tar.gz'
              },
              'linux-x86_64': {
                'signature': '$APPIMAGE_SIG',
                'url': '$BASE_URL/ContextuAI+Solo_${VERSION}_amd64.AppImage'
              }
            }
          }, indent=2))
          " "$NOTES" > latest.json

          cat latest.json
          gh release upload "$RELEASE_TAG" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
