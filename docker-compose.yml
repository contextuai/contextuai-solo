version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18741:18741"
    volumes:
      - ./backend:/app
      - ./agent-library:/agent-library
      - solo-data:/app/data
    environment:
      - CONTEXTUAI_MODE=desktop
      - HOST=0.0.0.0
      - PORT=18741
      - AGENT_LIBRARY_PATH=/agent-library
    env_file:
      - ./backend/.env

volumes:
  solo-data:
